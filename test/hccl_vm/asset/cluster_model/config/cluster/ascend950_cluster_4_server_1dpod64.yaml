name: "ascend950_cluster_4_server_1dpod64"
description: "昇腾950 1DPod64集群组网：4个超级节点，4个服务器每个超级节点1个服务器"

# 超节点总数量
super_node_num: 2
# sever/pod总数量
server_num: 4
server_list:
  # 0-1 server: 均采用ascend950_server_topo_1dpod64拓扑类型
  - {super_pod_id: 0, id_range: [0, 1], soc_version: "Ascend950", server_topo: "ascend950_server_topo_1dpod64.yaml"}
  - {super_pod_id: 1, id_range: [0, 1], soc_version: "Ascend950", server_topo: "ascend950_server_topo_1dpod64.yaml"}
