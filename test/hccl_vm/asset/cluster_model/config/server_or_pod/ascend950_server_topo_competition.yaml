type: "server_intra_links"
name: "ascend950_links_topo_competition"
description: "ascend950芯片competition类型拓扑连接关系描述文件"

soc_version: "Ascend950"
device_num: 8

device_ports_allocate_map:
 # port分配表: 0: 不使用, 1: device直连, 2: device连交换机, 3: d2h端口
 #                 portId:  0  1  2  3  4  5  6  7  8
    - {die_id: 0, pin_map: [0, 1, 1, 1, 2, 2, 2, 2, 0]} # die0
    - {die_id: 1, pin_map: [1, 1, 1, 1, 0, 2, 2, 0, 0]} # die1

port_group:
    - {layer: 1, ports: ["0/4", "0/5", "0/6", "0/7", "1/5", "1/6"]}

links:
  - link_mode: "enum"
    device_to_device_links:
      - {src_die_id: 1, src_local_id_range: [0], dst_die_id: 1, dst_local_id_range: [1, 3, 5, 7]}
      - {src_die_id: 0, src_local_id_range: [0], dst_die_id: 1, dst_local_id_range: [2, 4, 6]}
      - {src_die_id: 0, src_local_id_range: [1], dst_die_id: 0, dst_local_id_range: [2, 4, 6]}
      - {src_die_id: 1, src_local_id_range: [1], dst_die_id: 0, dst_local_id_range: [3, 5, 7]}
      - {src_die_id: 1, src_local_id_range: [2], dst_die_id: 1, dst_local_id_range: [3, 5, 7]}
      - {src_die_id: 0, src_local_id_range: [2], dst_die_id: 1, dst_local_id_range: [4, 6]}
      - {src_die_id: 0, src_local_id_range: [3], dst_die_id: 0, dst_local_id_range: [4, 6]}
      - {src_die_id: 1, src_local_id_range: [3], dst_die_id: 0, dst_local_id_range: [5, 7]}
      - {src_die_id: 1, src_local_id_range: [4], dst_die_id: 1, dst_local_id_range: [5, 7]}
      - {src_die_id: 0, src_local_id_range: [4], dst_die_id: 1, dst_local_id_range: [6]}
      - {src_die_id: 0, src_local_id_range: [5], dst_die_id: 0, dst_local_id_range: [6]}
      - {src_die_id: 1, src_local_id_range: [5], dst_die_id: 0, dst_local_id_range: [7]}
      - {src_die_id: 1, src_local_id_range: [6], dst_die_id: 1, dst_local_id_range: [7]}
