repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.0
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: local
    hooks:
      - id: clang-tidy-staged
        name: clang-tidy staged C/C++ files
        entry: bash scripts/clang_tidy_precommit.sh
        language: system
        pass_filenames: true
        types_or: [c++, c]
        stages: [commit]
        verbose: true

  # OAT compliance check (Open Source Audit Tool)
  - repo: local
    hooks:
      - id: oat-check
        name: OAT Compliance Check
        entry: bash scripts/oat_check.sh
        language: system
        pass_filenames: true
        types: [file]
        stages: [commit]
        verbose: true
