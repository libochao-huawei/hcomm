    <line x1="230" y1="226" x2="630" y2="390"/><line x1="295" y1="226" x2="630" y2="390"/>
    <line x1="560" y1="226" x2="630" y2="390"/><line x1="625" y1="226" x2="630" y2="390"/>
    <line x1="690" y1="226" x2="630" y2="390"/><line x1="755" y1="226" x2="630" y2="390"/>
