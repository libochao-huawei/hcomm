      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0f4f8"/>
    </radialGradient>
    <radialGradient id="card" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0088cc"/><stop offset="100%" stop-color="#005599"/>
    </radialGradient>
    <radialGradient id="fab0" cx="35%" cy="35%" r="65%">
