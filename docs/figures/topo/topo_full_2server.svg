    <text x="475" y="523" fill="#005599" font-size="12" font-weight="bold" font-family="monospace">10.5 GetInstSizeListByLayer → L0:[8,8], L1:[16,16]</text>

    <rect x="460" y="545" width="420" height="36" rx="6" fill="#d6e8f0" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="475" y="568" fill="#005599" font-size="12" font-weight="bold" font-family="monospace">10.2 GetRanksByLayer(L0) → [0..7] or [8..15]</text>

    <rect x="460" y="590" width="420" height="36" rx="6" fill="#d6e8f0" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="475" y="613" fill="#005599" font-size="12" font-weight="bold" font-family="monospace">10.6 GetLinks(r0,r8,L1) → 2条UB_CTP链路(P0+P1)</text>

    <rect x="20" y="635" width="420" height="36" rx="6" fill="#d6e8f0" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="35" y="658" fill="#005599" font-size="12" font-weight="bold" font-family="monospace">10.7 GetTopoInstsByLayer(L1) → [0,1]</text>

    <rect x="460" y="635" width="420" height="36" rx="6" fill="#d6e8f0" stroke="#4a9aca" stroke-width="1.5"/>
    <text x="475" y="658" fill="#005599" font-size="12" font-weight="bold" font-family="monospace">10.8 GetEndpointNum → 各端点属性查询</text>
  </g>

