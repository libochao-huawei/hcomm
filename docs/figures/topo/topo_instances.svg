    <line x1="80" y1="350" x2="170" y2="295"/><line x1="140" y1="350" x2="170" y2="295"/>
    <line x1="200" y1="350" x2="170" y2="295"/><line x1="260" y1="350" x2="170" y2="295"/>
    <line x1="80" y1="375" x2="170" y2="295"/><line x1="140" y1="375" x2="170" y2="295"/>
    <line x1="200" y1="375" x2="170" y2="295"/><line x1="260" y1="375" x2="170" y2="295"/>
    <line x1="80" y1="400" x2="170" y2="295"/><line x1="140" y1="400" x2="170" y2="295"/>
    <line x1="200" y1="400" x2="170" y2="295"/><line x1="260" y1="400" x2="170" y2="295"/>
