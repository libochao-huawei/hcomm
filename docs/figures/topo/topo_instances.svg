    <line x1="540" y1="315" x2="510" y2="295"/><line x1="600" y1="315" x2="510" y2="295"/>
    <line x1="420" y1="350" x2="510" y2="295"/><line x1="480" y1="350" x2="510" y2="295"/>
    <line x1="540" y1="350" x2="510" y2="295"/><line x1="600" y1="350" x2="510" y2="295"/>
    <line x1="420" y1="375" x2="510" y2="295"/><line x1="480" y1="375" x2="510" y2="295"/>
    <line x1="540" y1="375" x2="510" y2="295"/><line x1="600" y1="375" x2="510" y2="295"/>
    <line x1="420" y1="400" x2="510" y2="295"/><line x1="480" y1="400" x2="510" y2="295"/>
    <line x1="540" y1="400" x2="510" y2="295"/><line x1="600" y1="400" x2="510" y2="295"/>
