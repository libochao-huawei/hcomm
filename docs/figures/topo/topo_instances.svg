    <circle cx="420" cy="385" r="10" fill="url(#cT)"/><circle cx="480" cy="385" r="10" fill="url(#cT)"/>
    <circle cx="540" cy="385" r="10" fill="url(#cT)"/><circle cx="600" cy="385" r="10" fill="url(#cT)"/>
