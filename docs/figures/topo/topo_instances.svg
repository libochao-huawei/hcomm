  <rect x="20" y="50" width="300" height="150" rx="8" fill="#d6e8f0" opacity="0.3"/>
  <text x="170" y="70" text-anchor="middle" fill="#1a5a8a" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Layer 0 · TopoInstance 0（Server 0 内 8 卡）</text>
  <g filter="url(#gT)">
    <circle cx="75" cy="115" r="12" fill="url(#cT)"/><circle cx="135" cy="115" r="12" fill="url(#cT)"/>
    <circle cx="195" cy="115" r="12" fill="url(#cT)"/><circle cx="255" cy="115" r="12" fill="url(#cT)"/>
    <circle cx="75" cy="160" r="12" fill="url(#cT)"/><circle cx="135" cy="160" r="12" fill="url(#cT)"/>
