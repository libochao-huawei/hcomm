<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440">
  <defs>
    <radialGradient id="bgT" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0f4f8"/>
    </radialGradient>
    <radialGradient id="cT" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0088cc"/><stop offset="100%" stop-color="#005599"/>
    </radialGradient>
    <radialGradient id="f0T" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e85d04"/><stop offset="100%" stop-color="#b94800"/>
    </radialGradient>
    <radialGradient id="f1T" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <filter id="gT"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="680" height="440" fill="url(#bgT)" rx="12" stroke="#ccc" stroke-width="1"/>
  <text x="340" y="28" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold" font-family="Arial, sans-serif">TopoInstance 分布示意（2 Server × 8 卡 + 双平面 Clos）</text>

  <!-- ===== Layer 0: 2 TopoInstances ===== -->
