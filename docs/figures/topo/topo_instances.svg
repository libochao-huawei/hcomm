  <rect x="360" y="50" width="300" height="150" rx="8" fill="#d6e8f0" opacity="0.3"/>
  <text x="510" y="70" text-anchor="middle" fill="#1a5a8a" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Layer 0 · TopoInstance 1（Server 1 内 8 卡）</text>
