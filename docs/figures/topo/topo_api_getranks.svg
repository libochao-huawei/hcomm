<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0f4f8"/>
    </radialGradient>
    <radialGradient id="c2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0088cc"/><stop offset="100%" stop-color="#005599"/>
    </radialGradient>
    <filter id="gl2"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="500" height="200" fill="url(#bg2)" rx="10" stroke="#ccc" stroke-width="1"/>
  <text x="250" y="26" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="Arial, sans-serif">10.2 HcclRankGraphGetRanksByLayer（假设本卡为 rank 0）</text>

  <!-- Layer 0 box -->
  <rect x="50" y="45" width="400" height="70" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2.5"/>
  <text x="250" y="70" text-anchor="middle" fill="#155724" font-size="13" font-weight="bold" font-family="Arial, sans-serif">← Layer 0：netLayer=0，返回本 Server 内 8 卡</text>

  <!-- 8 evenly-spaced centered nodes -->
  <g filter="url(#gl2)">
    <circle cx="75" cy="100" r="12" fill="url(#c2)" stroke="#28a745" stroke-width="2"/>
    <circle cx="125" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="175" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="225" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="275" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="325" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="375" cy="100" r="12" fill="url(#c2)"/>
    <circle cx="425" cy="100" r="12" fill="url(#c2)"/>
  </g>
  <g fill="#fff" font-size="10" font-weight="bold" text-anchor="middle" font-family="Arial">
    <text x="75" y="104">0</text><text x="125" y="104">1</text><text x="175" y="104">2</text><text x="225" y="104">3</text>
    <text x="275" y="104">4</text><text x="325" y="104">5</text><text x="375" y="104">6</text><text x="425" y="104">7</text>
  </g>
  <text x="250" y="135" text-anchor="middle" fill="#155724" font-size="11" font-family="monospace">ranks = [0,1,2,3,4,5,6,7]  rankNum = 8</text>

  <!-- Layer 1 box -->
  <rect x="50" y="145" width="400" height="40" rx="8" fill="#f0f4f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="170" text-anchor="middle" fill="#6a6a8a" font-size="11" font-family="Arial, sans-serif">Layer 1：netLayer=1，返回全局 16 卡 [0,1,...,15]</text>
</svg>
